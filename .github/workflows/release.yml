name: Release to PyPI

# Publish when a version tag is pushed (e.g. v1.0.1). Uses PyPI "trusted
# publishing" (OIDC): PyPI trusts this repository's workflow directly, so no API
# token is stored in the repository.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # The environment name must match the one configured in the PyPI trusted
    # publisher settings.
    environment: pypi

    permissions:
      # Required for PyPI trusted publishing (OIDC).
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
