name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.12
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `datasets`: the offline IMDB tests patch `datasets.load_dataset`, which
      # needs the package importable. `torch`: the collation/model/training
      # tests use PyTorch (CPU wheels on Linux, configured in pyproject).
      - name: Install dependencies
        run: uv sync --extra dev --extra datasets --extra torch

      - name: Check formatting (Black)
        run: uv run black --check .

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Type checking (MyPy)
        run: uv run mypy polaris

      - name: Run tests
        run: uv run pytest --cov=polaris --cov-report=term-missing
